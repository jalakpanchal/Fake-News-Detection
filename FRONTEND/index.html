<!DOCTYPE html>
<html>
<head>
  <title>VeritasFeed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>VERITAS<span class="purple">FEED</span></h1>

    <div class="header-right">
      <span id="time"></span>
      <button onclick="toggleDark()">🌙</button>
    </div>
  </div>

  <!-- INPUT BOX -->
  <div class="input-box">
    <input id="newsInput" placeholder="Enter news to verify..." />
    <button onclick="verifyCustom()">VERIFY CUSTOM TEXT →</button>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-text" id="ticker">
      Loading news...
    </div>
  </div>

  <!-- NEWS GRID -->
  <div class="grid" id="news"></div>

  <script src="script.js"></script>
</body>
</html>
